<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1B5E3F" />
    <meta
      name="description"
      content="جدول متابعة حفظ القرآن الكريم للطالبة ياسمين — متابعة يومية للحفظ والمراجعة والتجويد مع مزامنة سحابية."
    />
    <title>جدول متابعة حفظ القرآن — ياسمين</title>
    <script>
      /* favicon: أيقونة المصحف (SVG مضمّن) */
      (function () {
        const svg =
          "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'>" +
          "<rect x='11' y='9' width='42' height='47' rx='5' fill='#EFE7CE'/>" +
          "<rect x='14' y='6' width='38' height='52' rx='6' fill='#1B5E3F' stroke='#14512F' stroke-width='1.4'/>" +
          "<rect x='47' y='6' width='5' height='52' rx='2.5' fill='#0f3f28'/>" +
          "<rect x='19' y='11' width='28' height='42' rx='3' fill='none' stroke='#D4AF37' stroke-width='1.5'/>" +
          "<g transform='translate(33,32)' fill='none' stroke='#D4AF37' stroke-width='1.7'>" +
          "<rect x='-7.5' y='-7.5' width='15' height='15' rx='1'/>" +
          "<rect x='-7.5' y='-7.5' width='15' height='15' rx='1' transform='rotate(45)'/></g>" +
          "<circle cx='33' cy='32' r='2.3' fill='#D4AF37'/></svg>";
        const link = document.createElement('link');
        link.rel = 'icon';
        link.type = 'image/svg+xml';
        link.href = 'data:image/svg+xml,' + encodeURIComponent(svg);
        document.head.appendChild(link);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
